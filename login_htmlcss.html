<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #F5B800;
      --yellow-dark: #E07B00;
      --yellow-light: #FFD84D;
      --bg-right: #F0F0F3;
      --white: #ffffff;
      --text-dark: #1A1A1A;
      --text-muted: #6B6B6B;
      --border: #E2E2E2;
      --input-focus: #F5B800;
      --radius: 14px;
      --shadow-card: 0 8px 40px rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      font-family: 'Sora', sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg-right);
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      flex: 0 0 50%;
      position: relative;
      overflow: hidden;
      background: #0d0d0d;
    }

    /* Animated blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(0px);
      animation: drift 8s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle at 40% 40%, #FFD000, #FF7A00 60%, transparent 85%);
      top: -120px; left: -80px;
      animation-duration: 9s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle at 50% 50%, #fff5a0, #FFB300 55%, transparent 80%);
      top: 20%; left: 15%;
      animation-duration: 11s; animation-delay: -3s;
    }
    .blob-3 {
      width: 480px; height: 480px;
      background: radial-gradient(circle at 60% 60%, #FF6B00, #FF9500 50%, transparent 80%);
      bottom: -80px; left: -60px;
      animation-duration: 13s; animation-delay: -6s;
    }
    .blob-4 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, #FFE566, #FFC200 60%, transparent 85%);
      bottom: 12%; right: 8%;
      animation-duration: 7s; animation-delay: -2s;
    }
    .blob-5 {
      width: 120px; height: 120px;
      background: radial-gradient(circle, #FFE566, #FFAA00 60%, transparent 85%);
      top: 30%; right: 10%;
      animation-duration: 10s; animation-delay: -4s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Shooting lines */
    .lines {
      position: absolute; inset: 0; pointer-events: none;
      overflow: hidden;
    }
    .line {
      position: absolute;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(255,220,80,0.6), transparent);
      animation: shoot 4s ease-in-out infinite;
      opacity: 0;
    }
    .line:nth-child(1) { height: 80px; left: 72%; top: 5%;  animation-delay: 0s;   transform: rotate(-45deg); }
    .line:nth-child(2) { height: 50px; left: 30%; top: 15%; animation-delay: 1.5s; transform: rotate(-40deg); }
    .line:nth-child(3) { height: 60px; left: 55%; top: 55%; animation-delay: 2.8s; transform: rotate(-50deg); }
    .line:nth-child(4) { height: 40px; left: 20%; top: 70%; animation-delay: 0.8s; transform: rotate(-42deg); }

    @keyframes shoot {
      0%   { opacity: 0; transform: translateY(-20px) rotate(-45deg); }
      20%  { opacity: 1; }
      80%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(60px) rotate(-45deg); }
    }

    /* Dots */
    .dot {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,220,80,0.85);
      animation: pulse 3s ease-in-out infinite alternate;
    }
    .dot-1 { width: 10px; height: 10px; top: 22%; left: 60%; animation-delay: 0s; }
    .dot-2 { width: 6px;  height: 6px;  top: 40%; left: 25%; animation-delay: 1s; }
    .dot-3 { width: 14px; height: 14px; bottom: 25%; left: 55%; animation-delay: 2s;
              background: linear-gradient(135deg, #FFD84D, #FF9500); }

    @keyframes pulse {
      from { opacity: 0.4; transform: scale(0.9); }
      to   { opacity: 1;   transform: scale(1.2); }
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
    }

    /* Decorative blobs on right background */
    .right-panel::before,
    .right-panel::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(200,200,210,0.35);
      pointer-events: none;
    }
    .right-panel::before {
      width: 260px; height: 260px;
      top: -80px; right: -80px;
    }
    .right-panel::after {
      width: 180px; height: 180px;
      bottom: -60px; right: 40px;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-card);
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .card-subtitle {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* ── FIELD ── */
    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0 14px;
      height: 52px;
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 4px rgba(245,184,0,0.15);
    }

    .input-wrap svg {
      flex-shrink: 0;
      color: #9E9E9E;
      transition: color 0.2s;
    }
    .input-wrap:focus-within svg { color: var(--yellow); }

    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Sora', sans-serif;
      font-size: 0.92rem;
      color: var(--text-dark);
      background: transparent;
    }

    .toggle-pw {
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      color: #9E9E9E;
      display: flex;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--yellow); }

    /* ── OPTIONS ROW ── */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      font-size: 0.855rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text-dark);
      font-weight: 500;
    }

    /* Custom checkbox */
    .checkbox-label input[type="checkbox"] { display: none; }

    .checkbox-box {
      width: 18px; height: 18px;
      border-radius: 5px;
      background: var(--yellow);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .checkbox-box svg { display: block; }

    .checkbox-label input[type="checkbox"]:not(:checked) + .checkbox-box {
      background: transparent;
      border: 1.5px solid var(--border);
    }
    .checkbox-label input[type="checkbox"]:not(:checked) + .checkbox-box svg { display: none; }

    .forgot-link {
      color: var(--text-dark);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--yellow-dark); }

    /* ── SUBMIT BTN ── */
    .btn-submit {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--yellow-light) 0%, var(--yellow) 50%, var(--yellow-dark) 100%);
      color: #1A1A1A;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(245,184,0,0.45);
      margin-bottom: 24px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(245,184,0,0.55);
    }
    .btn-submit:active { transform: translateY(0); }

    /* Sheen animation */
    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.35) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.45s ease;
    }
    .btn-submit:hover::after { transform: translateX(100%); }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 0.82rem;
      color: #ABABAB;
      font-weight: 500;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── SOCIAL BTNS ── */
    .btn-social {
      width: 100%;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      font-family: 'Sora', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-dark);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      margin-bottom: 12px;
    }
    .btn-social:last-child { margin-bottom: 0; }

    .btn-social:hover {
      border-color: #C0C0C0;
      box-shadow: 0 4px 14px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }

    /* Google icon */
    .icon-google {
      width: 20px; height: 20px;
    }

    /* Microsoft icon */
    .icon-microsoft {
      width: 20px; height: 20px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .left-panel { display: none; }
      .right-panel { background: var(--bg-right); }
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
    <div class="lines">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="card">
      <h1 class="card-title">Connectez-vous à<br>votre compte</h1>
      <p class="card-subtitle">Bienvenue! Entrez vos identifiants.</p>

      <!-- Email -->
      <div class="field">
        <label for="email">Adresse email</label>
        <div class="input-wrap">
          <!-- Mail icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
          <input type="email" id="email" placeholder="vous@exemple.com" autocomplete="email"/>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <!-- Lock icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" value="••••••••" autocomplete="current-password"/>
          <button class="toggle-pw" id="togglePw" type="button" title="Afficher/masquer">
            <!-- Eye-off icon -->
            <svg id="eyeOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <!-- Eye icon (hidden) -->
            <svg id="eyeOn" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Options -->
      <div class="options-row">
        <label class="checkbox-label">
          <input type="checkbox" checked/>
          <span class="checkbox-box">
            <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
              <path d="M1 4.5L4 7.5L10 1" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Se souvenir de moi
        </label>
        <a class="forgot-link" href="#">Mot de passe oublié ?</a>
      </div>

      <!-- Submit -->
      <button class="btn-submit" type="button">Se connecter</button>


    </div>
  </div>

  <script>
    // Toggle password visibility
    const togglePw = document.getElementById('togglePw');
    const pwInput  = document.getElementById('password');
    const eyeOff   = document.getElementById('eyeOff');
    const eyeOn    = document.getElementById('eyeOn');

    togglePw.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      eyeOff.style.display = show ? 'none'  : 'block';
      eyeOn.style.display  = show ? 'block' : 'none';
    });
  </script>
</body>
</html>
